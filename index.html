<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist Card — Everything about an artist on one page</title>
  <meta name="description" content="Artist Card: one self-contained page per artist — biography, statement, movement, galleries, videos, CV, books, shows and work." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=20260624-2" />
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a class="brand" href="#" id="brandLink">
        <span class="brand-dot"></span>
        Artist Card
      </a>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" type="search" placeholder="Search artists, movements, mediums, places…" autocomplete="off" aria-label="Search artists" />
      </div>
      <button class="readaloud" id="readAloud" type="button" aria-pressed="false" title="Read this page aloud" hidden>
        <svg class="ra-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor"/><path d="M15.5 8.5a5 5 0 010 7M18 6a8 8 0 010 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="ra-label">Read aloud</span>
      </button>
    </div>
    <div class="chips" id="filterChips" aria-label="Quick filters"></div>
  </header>

  <main id="view" class="view">
    <!-- Rendered by app.js -->
  </main>

  <footer class="site-footer">
    <p>Artist Card — one self-contained page per artist. Data lives in <code>data/artists.json</code>.</p>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Previous work">&#8249;</button>
    <button class="lightbox-nav next" id="lightboxNext" aria-label="Next work">&#8250;</button>
    <figure class="lightbox-fig">
      <div class="lightbox-img" id="lightboxImg"></div>
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
  </div>

  <script src="js/app.js?v=20260624-2"></script>
</body>
</html>
